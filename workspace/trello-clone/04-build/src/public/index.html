<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trello Clone</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header id="app-header">
    <h1>Trello Clone</h1>
  </header>

  <main id="app-main">
    <!-- Boards overview: list of boards, empty-state message, create-board control -->
    <section id="boards-view">
      <form id="create-board-form">
        <input id="create-board-input" type="text" placeholder="New board title" autocomplete="off" />
        <button type="submit">Create board</button>
      </form>
      <ul id="boards-list"></ul>
    </section>

    <!-- Single board view: lists + cards for the currently open board -->
    <section id="board-view" hidden>
      <button id="back-to-boards" type="button">&larr; Boards</button>
      <h2 id="board-view-title"></h2>
      <form id="create-list-form">
        <input id="create-list-input" type="text" placeholder="New list title" autocomplete="off" />
        <button type="submit">Create list</button>
      </form>
      <div id="lists-container"></div>
    </section>
  </main>

  <!-- Card detail modal, populated when a card is opened -->
  <div id="card-modal" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
